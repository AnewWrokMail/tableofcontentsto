<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faceless Data Engine</title>
    <script>
        const activeEmails = [
            'anewworkmail@gmail.com',
            'anewworkmail@gmail.com'
        ];

        function isEmailOnList(email) {
            if (!email || typeof email !== 'string') return false;
            const cleanEmail = email.trim().toLowerCase();
            return activeEmails.some(entry => entry.trim().toLowerCase() === cleanEmail);
        }

        function getEmailList() {
            return [...activeEmails];
        }
    </script>
</head>
<body>
</body>
</html>
